<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>Fashion Wardrobe - Color Palette Stylist</title>
	<style>
		body{font-family:system-ui,Segoe UI,Roboto,Arial;margin:0;background:#f7f7f8;color:#111}
		header{background:#222;color:#fff;padding:18px 20px}
		.container{max-width:900px;margin:28px auto;padding:20px;background:#fff;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,.06)}
		label{display:block;margin:12px 0 6px;font-weight:600}
		select,input{padding:10px;border:1px solid #ddd;border-radius:6px;width:100%;box-sizing:border-box}
		.row{display:flex;gap:12px}
		.col{flex:1}
		button{margin-top:14px;padding:10px 16px;border:0;background:#2b8aef;color:#fff;border-radius:8px;cursor:pointer}
		.palette{display:flex;gap:8px;margin-top:10px}
		.sw{width:36px;height:36px;border-radius:6px;border:1px solid #ccc}
		.suggestions{margin-top:18px}
		.item{padding:12px;border-radius:8px;border:1px solid #eee;margin-bottom:12px}
		footer{text-align:center;color:#666;font-size:13px;margin-top:18px}
	</style>
</head>
<body>
	<header>
		<h1 style="margin:0;font-size:20px">Fashion Wardrobe — Color Palette Stylist</h1>
	</header>
	<main class="container">
		<p>Choose a color palette and a style preference. We'll suggest outfits that match your palette.</p>

		<label for="palette">Color palette</label>
		<select id="palette">
			<option value="neutral">Neutral (black, white, gray, beige)</option>
			<option value="pastel">Pastel (mint, blush, lavender)</option>
			<option value="vibrant">Vibrant (red, cobalt, mustard)</option>
			<option value="earth">Earthy (olive, terracotta, camel)</option>
			<option value="monochrome">Monochrome (single-color focus)</option>
		</select>

		<div class="row" style="margin-top:12px">
			<div class="col">
				<label for="occasion">Occasion</label>
				<select id="occasion">
					<option value="casual">Casual</option>
					<option value="work">Work / Office</option>
					<option value="formal">Formal / Evening</option>
					<option value="sporty">Sporty</option>
				</select>
			</div>
			<div class="col">
				<label for="season">Season / Weather</label>
				<select id="season">
					<option value="mild">Mild</option>
					<option value="cold">Cold</option>
					<option value="warm">Warm</option>
				</select>
			</div>
		</div>

		<div style="display:flex;align-items:center;justify-content:space-between">
			<div>
				<label>Palette preview</label>
				<div id="preview" class="palette"></div>
			</div>
			<div style="margin-left:12px">
				<button id="suggest">Suggest Outfit</button>
			</div>
		</div>

		<section class="suggestions" id="suggestions"></section>

		<footer>Quick, offline outfit suggestions based on color palette.</footer>
	</main>

	<script>
		const palettes = {
			neutral:['#111',' #666','#ddd','#f5f0e6'],
			pastel:['#c7f0d6','#ffd1dc','#d9d3ff','#fff4c2'],
			vibrant:['#d62828','#2a6fdb','#ffb703','#f77f00'],
			earth:['#6b8a47','#cc7a4a','#c9a66b','#4b3f35'],
			monochrome:['#c6d9ff','#8eaefc','#4f7bec','#153e90']
		}

		const preview = document.getElementById('preview')
		const palSel = document.getElementById('palette')
		const occ = document.getElementById('occasion')
		const season = document.getElementById('season')
		const suggestions = document.getElementById('suggestions')

		function renderPreview(){
			const key = palSel.value
			preview.innerHTML = ''
			(palettes[key] || []).slice(0,4).forEach(c=>{
				const d = document.createElement('div')
				d.className='sw'
				d.style.background = c
				preview.appendChild(d)
			})
		}

		function suggest(){
			const p = palSel.value
			const o = occ.value
			const s = season.value
			suggestions.innerHTML = ''

			// Basic mapping rules
			const base = {
				neutral: {top:'white tee or blouse',bottom:'black jeans or tailored trousers',outer:'beige trench or gray blazer',shoes:'clean white sneakers or loafers'},
				pastel: {top:'soft blouse or knit',bottom:'light-wash jeans or skirt',outer:'cream cardigan',shoes:'nude flats or sandals'},
				vibrant: {top:'bright statement top',bottom:'dark slim pants or denim',outer:'structured jacket',shoes:'neutral or matching bold shoes'},
				earth: {top:'warm-toned shirt',bottom:'corduroy or chinos',outer:'utility jacket or wool coat',shoes:'brown boots'},
				monochrome: {top:'shirt in chosen hue',bottom:'matching-tone trousers or skirt',outer:'layer in same family',shoes:'shades of same color'}
			}[p]

			// Occasion adjustments
			if(o==='formal') base.shoes = base.shoes.includes('sneaker')? 'dress shoes or heels': 'heels or polished loafers'
			if(o==='work') base.outer = base.outer.includes('cardigan')? 'structured blazer': base.outer
			if(o==='sporty') { base.top = 'performance tee or hoodie'; base.bottom = 'athleisure leggings or joggers'; base.shoes='trainers' }

			// Season adjustments
			if(s==='cold') base.outer = base.outer + ' + warm layer';
			if(s==='warm') base.outer = base.outer.replace(/coat|jacket|blazer/,'light layer')

			// Compose suggestions list
			const items = [
				{title:'Head-to-toe idea',desc:`${base.top}, ${base.bottom}, ${base.outer}, ${base.shoes}`},
				{title:'Accent tips',desc:'Add one or two accessories in a contrasting or matching palette (scarf, belt, bag). Keep metals consistent.'},
				{title:'Color balance',desc:'If your palette is vibrant or pastel, keep one neutral anchor piece to balance the look.'}
			]

			items.forEach(it=>{
				const el=document.createElement('div')
				el.className='item'
				el.innerHTML = `<strong>${it.title}</strong><div style="margin-top:6px">${it.desc}</div>`
				suggestions.appendChild(el)
			})
		}

		palSel.addEventListener('change',renderPreview)
		document.getElementById('suggest').addEventListener('click',suggest)
		renderPreview()
	</script>
</body>
</html>
