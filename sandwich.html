<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Food Story // Taste Magic</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lora:ital@0,400;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Lora', serif; background-color: #000; color: #fff; overflow-x: hidden; line-height: 1.8; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2; overflow: hidden; }
        .video-background video { width: 100%; height: 100%; object-fit: cover; }
        .video-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); z-index: -1; }
        .container { max-width: 800px; margin: 0 auto; padding: 100px 20px; }
        header { text-align: center; margin-bottom: 60px; }
        header h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; line-height: 1.2; margin-bottom: 15px; color: #fffefe; }
        header p { font-size: 1.1rem; font-style: italic; color: #ccc; }
        .story-card { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); padding: 60px 50px; border-radius: 16px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4); }
        .story-heading { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: #ffffff; margin-top: 45px; margin-bottom: 20px; }
        .story-heading:first-of-type { margin-top: 0; }
        .story-paragraph { font-size: 1.1rem; color: #f5f5f5; margin-bottom: 25px; text-align: justify; }
        .story-paragraph:last-of-type { margin-bottom: 0; }
        footer { text-align: center; margin-top: 60px; font-size: 0.85rem; color: #888; letter-spacing: 1px; }
        @media (max-width: 600px) { header h1 { font-size: 2.3rem; } .story-card { padding: 35px 25px; } .story-heading { font-size: 1.4rem; } }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay loop muted playsinline>
            <!-- CHANGE THIS FOR EACH ITEM (e.g., burger.mp4, donuts.mp4) -->
            <source src="ITEM_VIDEO.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>
    <div class="container">
        <header>
            <!-- INSERT HEADER H1 AND P HERE -->
            <h1>ITEM TITLE</h1>
            <p>ITEM SUBTITLE</p>
        </header>
        <main>
            <article class="story-card">
                <!-- INSERT THE 4 HEADINGS AND PARAGRAPHS FROM THE CATALOG BELOW HERE -->
            </article>
        </main>
        <footer>
            <p>CRAFTED WITH PASSION. COMFORT FOOD LEGACIES.</p>
        </footer>
    </div>
</body>
</html>
